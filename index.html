<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Progress Block</title>
  <link rel="stylesheet" href="public/css/progress.css">
</head>
<body>

  <div class="page-wrapper">

    <h1 class="page-title">Progress</h1>

    <div class="progress-stage">
      <div id="progressBlock" class="progress-container">
        <!-- SVG будет вставляться через JS -->
      </div>
    </div>

    <div class="controls-panel">
      <div class="control-row">
        <label class="control-label" for="valueInput">Value</label>
        <input
          class="control-input"
          type="number"
          id="valueInput"
          min="0"
          max="100"
          value="0"
        >
        <span class="control-hint">0 – 100</span>
      </div>

      <div class="control-row">
        <label class="control-label toggle-label" for="animateToggle">
          Animate
        </label>
        <div class="toggle-wrap">
          <input type="checkbox" id="animateToggle" class="toggle-checkbox">
          <label for="animateToggle" class="toggle-switch"></label>
        </div>
      </div>

      <div class="control-row">
        <label class="control-label toggle-label" for="hideToggle">
          Hide
        </label>
        <div class="toggle-wrap">
          <input type="checkbox" id="hideToggle" class="toggle-checkbox">
          <label for="hideToggle" class="toggle-switch"></label>
        </div>
      </div>
    </div>

  </div>

  <script src="public/js/progress.js"></script>
  <script>
    let prog = new Progress('#progressBlock');

    let valueInput = document.getElementById('valueInput');
    let animateCheck = document.getElementById('animateToggle');
    let hideCheck = document.getElementById('hideToggle');

    valueInput.addEventListener('input', function() {
      let v = parseInt(this.value, 10);
      if (isNaN(v)) v = 0;
      if (v < 0) v = 0;
      if (v > 100) v = 100;
      prog.setValue(v);
      if (this.value != v) this.value = v;
    });

    animateCheck.addEventListener('change', function() {
      prog.setAnimated(this.checked);
    });

    hideCheck.addEventListener('change', function() {
      prog.setHidden(this.checked);
    });

  </script>

</body>
</html>
